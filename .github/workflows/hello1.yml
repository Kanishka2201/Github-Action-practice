---
#This is workflow name
name: Hello

#runs on a trigger
on:
  push:
    branches:
      - main
#these are jobs inside the workflow
jobs:
#this is the name  of the job
  greet:
#this is github runner
    runs-on: ubuntu-22.04
    steps:
      - name: say hello to users
        run: echo "Hello Dosto"
      - name: say hello to users
        run: echo "Hello $USER"
  details:
    runs-on: ubuntu-22.04
    steps:
      - name: show what is the version of python, docker.
        run: docker --version && python --version


    
